<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Ultra Unique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #F13E93;
            --secondary: #FCB7C7;
            --dark: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: #F13E93;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; /* Particles ke liye */
            position: relative;
        }

        /* Unique Floating Particles Animation */
        .particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .container {
            position: relative; z-index: 1;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 40px;
            width: 480px; box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            transform: perspective(1000px) rotateX(2deg);
        }

        h2 { 
            font-weight: 600; text-align: center; margin-bottom: 10px; 
            color: var(--secondary); letter-spacing: 2px;
        }

        .score-board {
            text-align: center; font-size: 14px; margin-bottom: 25px;
            color: rgba(255,255,255,0.6); text-transform: uppercase;
        }

        #score { color: var(--secondary); font-weight: bold; }

        .input-area { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }

        input, select {
            padding: 16px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05); color: white; outline: none;
            transition: 0.4s;
        }

        input:focus { background: rgba(255, 255, 255, 0.1); border-color: var(--secondary); }

        .btn-add {
            padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--primary), #ca337a);
            color: white; cursor: pointer; font-weight: 600; 
            box-shadow: 0 10px 20px rgba(241, 62, 147, 0.3);
            transition: 0.3s;
        }

        .btn-add:hover { transform: scale(1.02); box-shadow: 0 15px 25px rgba(241, 62, 147, 0.5); }

        li {
            background: rgba(255, 255, 255, 0.03); padding: 18px;
            border-radius: 20px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s; cursor: pointer;
        }

        li:hover { 
            background: rgba(255, 255, 255, 0.08); 
            transform: translateX(5px);
            border-color: var(--secondary);
        }

        .task-info strong { display: block; font-size: 16px; }
        .task-info small { color: rgba(255,255,255,0.5); }

        .category-tag {
            font-size: 9px; padding: 4px 10px; border-radius: 20px;
            margin-top: 5px; display: inline-block; font-weight: bold;
        }
        .work { background: #3b82f6; } .personal { background: #10b981; } .urgent { background: #ef4444; }

        .done-btn {
            background: rgba(252, 183, 199, 0.1); color: var(--secondary);
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }

        .done-btn:hover { background: var(--secondary); color: var(--dark); }

    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
    <h2>TaskFlow Pro</h2>
    <div class="score-board">Productivity Score: <span id="score">0</span></div>
    
    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Enter a unique task...">
        <div style="display: flex; gap: 10px;">
            <select id="categorySelect" style="flex: 1;">
                <option value="work">Work</option>
                <option value="personal">Personal</option>
                <option value="urgent">Urgent</option>
            </select>
            <input type="date" id="dateInput" style="flex: 1;">
        </div>
        <button class="btn-add" onclick="addTask()">Ignite Task 🚀</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    let score = 0;

    // Create Floating Particles
    const particleContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.style.cssText = `
            position: absolute; width: ${Math.random()*5}px; height: ${Math.random()*5}px;
            background: white; border-radius: 50%; opacity: ${Math.random()};
            top: ${Math.random()*100}%; left: ${Math.random()*100}%;
            animation: float ${10 + Math.random()*20}s infinite linear;
        `;
        particleContainer.appendChild(p);
    }

    function addTask() {
        const input = document.getElementById('taskInput');
        const cat = document.getElementById('categorySelect');
        const date = document.getElementById('dateInput');

        if (!input.value) return;

        const taskData = { id: Date.now(), text: input.value, category: cat.value, date: date.value || 'Today' };
        createTaskUI(taskData);
        input.value = '';
    }

    function createTaskUI(data) {
        const li = document.createElement('li');
        li.innerHTML = `
            <div class="task-info">
                <strong>${data.text}</strong>
                <small>${data.date}</small><br>
                <span class="category-tag ${data.category}">${data.category}</span>
            </div>
            <div class="done-btn" onclick="completeTask(this)">✓</div>
        `;
        document.getElementById('taskList').appendChild(li);
    }

    function completeTask(btn) {
        score += 10;
        document.getElementById('score').innerText = score;
        
        confetti({ particleCount: 150, spread: 60, colors: ['#F13E93', '#FCB7C7'] });
        
        btn.parentElement.style.opacity = '0';
        setTimeout(() => btn.parentElement.remove(), 300);
    }
</script>

<style>
    @keyframes float {
        from { transform: translateY(0) translateX(0); }
        to { transform: translateY(-100vh) translateX(50px); }
    }
</style>

</body>
</html>
